services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: seo_tool
      POSTGRES_USER: seo_tool
      POSTGRES_PASSWORD: seo_tool
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
